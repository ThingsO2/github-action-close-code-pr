name: Test
on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Configure Corporate Nexus
        run: |
          echo "//nexus.monom.ai/repository/npm/:_auth=${{ secrets.NEXUS_AUTH }}" > .npmrc
          echo "registry=https://nexus.monom.ai/repository/npm/" >> .npmrc

      - name: Install
        run: yarn install --pure-lockfile

      - name: Test
        run: yarn test --coverage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Package Data
        id: read-package
        run: |
          echo "NAME=$(node -p "require('./package.json').name" | sed 's/@monom\///g')" >> $GITHUB_OUTPUT
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_HOST }}
        with:
          args: >
            -Dsonar.projectKey=front-${{ steps.read-package.outputs.NAME }}
            -Dsonar.projectName=${{ steps.read-package.outputs.NAME }}
            -Dsonar.projectVersion=${{ steps.read-package.outputs.VERSION }}
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.sources=src
            -Dsonar.tests=__tests__
            -Dsonar.exclusions=src/__mocks__/**.*

      - name: SonarQube Quality Gate check
        uses: sonarsource/sonarqube-quality-gate-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
